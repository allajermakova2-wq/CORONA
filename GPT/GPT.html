<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Crown Scene</title>
  <style>
    :root {
      --bg: #000;
      --pink: #ff2f7d;
      --blue: #4bb8ff;
      --gold: #ffbf3c;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      color: white;
    }

    /* matrix canvas */
    #matrixCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.22;
      pointer-events: none;
    }

    /* soft vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.8) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 34px;
      padding: 28px 20px 40px;
    }

    .top-wrap {
      position: relative;
      width: min(92vw, 540px);
      animation: floatSign 4.2s ease-in-out infinite;
    }

    .sign {
      width: 100%;
      display: block;
      filter:
        drop-shadow(0 0 8px rgba(255, 47, 125, 0.35))
        drop-shadow(0 0 22px rgba(255, 47, 125, 0.18));
      animation: neonPulse 2.8s ease-in-out infinite alternate;
    }

    .notice {
      position: absolute;
      top: 4%;
      right: 2%;
      width: 39%;
      transform-origin: top center;
      animation: paperSwing 3.2s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
    }

    .bottom-wrap {
      position: relative;
      width: min(86vw, 520px);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 4px;
    }

    .halo {
      position: absolute;
      inset: auto;
      width: 58%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,221,90,0.42) 0%, rgba(255,221,90,0.16) 32%, rgba(255,221,90,0.04) 54%, transparent 72%);
      filter: blur(8px);
      animation: haloPulse 3.6s ease-in-out infinite;
      z-index: 0;
    }

    .crown {
      position: relative;
      z-index: 2;
      width: 62%;
      max-width: 340px;
      display: block;
      animation:
        crownRise 1.2s ease-out both,
        crownFloat 4.6s ease-in-out 1.2s infinite;
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.25))
        drop-shadow(0 0 28px rgba(255, 210, 90, 0.22));
    }

    .sparkles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 18px rgba(255,225,120,0.9),
        0 0 28px rgba(255,225,120,0.65);
      animation: twinkle 2.4s infinite ease-in-out;
      opacity: 0;
    }

    .spark::before,
    .spark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(255,255,255,0.95);
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .spark::before {
      width: 2px;
      height: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    .spark::after {
      width: 20px;
      height: 2px;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    .spark.s1 { top: 22%; left: 24%; animation-delay: 0.2s; }
    .spark.s2 { top: 29%; left: 68%; animation-delay: 0.8s; }
    .spark.s3 { top: 45%; left: 18%; animation-delay: 1.4s; }
    .spark.s4 { top: 57%; left: 76%; animation-delay: 0.5s; }
    .spark.s5 { top: 68%; left: 34%; animation-delay: 1.8s; }
    .spark.s6 { top: 18%; left: 54%; animation-delay: 2.1s; }

    @keyframes neonPulse {
      0% {
        filter:
          drop-shadow(0 0 6px rgba(255, 47, 125, 0.28))
          drop-shadow(0 0 16px rgba(75, 184, 255, 0.08));
      }
      100% {
        filter:
          drop-shadow(0 0 10px rgba(255, 47, 125, 0.55))
          drop-shadow(0 0 28px rgba(75, 184, 255, 0.16));
      }
    }

    @keyframes floatSign {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @keyframes paperSwing {
      0%, 100% { transform: rotate(4deg); }
      50% { transform: rotate(1deg); }
    }

    @keyframes crownRise {
      from {
        opacity: 0;
        transform: translateY(26px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes crownFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.01); }
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(0.96); opacity: 0.68; }
      50% { transform: scale(1.08); opacity: 0.95; }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.55) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      50% {
        transform: scale(1.15) rotate(45deg);
        opacity: 1;
      }
      80% {
        opacity: 0.25;
      }
    }

    @media (max-width: 700px) {
      .top-wrap { width: 94vw; }
      .notice { width: 44%; }
      .crown { width: 72%; }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>
  <div class="vignette"></div>

  <div class="scene">
    <div class="top-wrap">
      <img class="sign" src="sign.png" alt="Закрыто в связи с ремонтными работами">
      <img class="notice" src="notice.png" alt="Technical break notice">
    </div>

    <div class="bottom-wrap">
      <div class="halo"></div>

      <div class="sparkles">
        <div class="spark s1"></div>
        <div class="spark s2"></div>
        <div class="spark s3"></div>
        <div class="spark s4"></div>
        <div class="spark s5"></div>
        <div class="spark s6"></div>
      </div>

      <img class="crown" src="crown.png" alt="Корона">
    </div>
  </div>

  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アイウエオカキクケコサシスセソヤユヨワヲン";
    const fontSize = 18;
    let columns = Math.floor(width / fontSize);
    let drops = Array(columns).fill(1).map(() => Math.random() * height / fontSize);

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      columns = Math.floor(width / fontSize);
      drops = Array(columns).fill(1).map(() => Math.random() * height / fontSize);
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.10)";
      ctx.fillRect(0, 0, width, height);

      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillStyle = Math.random() > 0.85 ? "#ffd84d" : "#39ff88";
        ctx.fillText(text, x, y);

        if (y > height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i] += 0.65;
      }
    }

    setInterval(drawMatrix, 55);
    window.addEventListener("resize", resize);
  </script>
</body>
</html>
