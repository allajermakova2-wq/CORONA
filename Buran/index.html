<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интеллект Х</title>
  <style>
    :root{
      --bg:#000;
      --star:#f4f8ff;
      --text:rgba(236,241,250,.95);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:"Segoe UI",Arial,sans-serif;
    }

    body{
      position:relative;
      background:
        radial-gradient(circle at 50% 44%, rgba(24,40,72,.10) 0%, rgba(0,0,0,0) 26%),
        radial-gradient(circle at 50% 58%, rgba(70,110,180,.05) 0%, rgba(0,0,0,0) 17%),
        #000;
    }

    #scene{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:#000;
    }

    .star{
      position:absolute;
      border-radius:50%;
      background:var(--star);
      opacity:.14;
      box-shadow:0 0 7px rgba(255,255,255,.22);
      pointer-events:none;
      animation:twinkle linear infinite;
      will-change:transform,opacity;
    }

    /* Формулы — того же цвета, что и звезды */
    .formula{
      position:absolute;
      color:rgba(244,248,255,.30);
      font-family:"Times New Roman", Georgia, serif;
      white-space:nowrap;
      user-select:none;
      pointer-events:none;
      text-shadow:
        0 0 4px rgba(255,255,255,.05),
        0 0 10px rgba(255,255,255,.06);
      mix-blend-mode:screen;
      animation:twinkle linear infinite;
      will-change:transform,opacity;
    }

    @keyframes twinkle{
      0%,100%{opacity:.08;transform:scale(.96)}
      50%{opacity:.96;transform:scale(1.05)}
    }

    /* Надпись почти на всю длину экрана */
    .title-wrap{
      position:absolute;
      left:50%;
      top:29%;
      width:min(92vw, 1500px);
      transform:translate(-50%,-50%);
      z-index:20;
      text-align:center;
      pointer-events:none;
    }

    .title{
      width:100%;
      font-weight:300;
      font-size:clamp(40px,6.4vw,112px);
      letter-spacing:.10em;
      color:var(--text);
      text-shadow:
        0 0 10px rgba(190,215,255,.08),
        0 0 24px rgba(140,175,255,.06);
      position:relative;
      display:block;
      white-space:nowrap;
    }

    /* Жирная, сверкающая Х */
    .title .x{
      position:relative;
      display:inline-block;
      font-weight:700;
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.98),
        0 0 16px rgba(220,235,255,.95),
        0 0 26px rgba(180,220,255,.90),
        0 0 42px rgba(140,190,255,.72),
        0 0 74px rgba(110,170,255,.32);
      animation:xPulse 2.1s ease-in-out infinite;
    }

    @keyframes xPulse{
      0%,100%{opacity:.92;transform:scale(1)}
      50%{opacity:1;transform:scale(1.02)}
    }

    /* Разноцветные искры вокруг Х */
    .sparkle-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:25;
    }

    .spark{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      opacity:0;
      filter:blur(.15px);
      animation:sparkle linear infinite;
      mix-blend-mode:screen;
    }

    .spark.line{
      width:2px;
      height:16px;
      border-radius:999px;
      filter:blur(.2px);
      transform-origin:center;
    }

    @keyframes sparkle{
      0%{
        opacity:0;
        transform:translate(0,0) scale(.35) rotate(0deg);
      }
      18%{
        opacity:1;
      }
      55%{
        opacity:.95;
      }
      100%{
        opacity:0;
        transform:translate(var(--dx),var(--dy)) scale(1.6) rotate(var(--rot));
      }
    }

    .x-beam{
      position:absolute;
      left:50%;
      top:calc(100% + 6px);
      transform:translateX(236px);
      width:16px;
      height:300px;
      background:
        linear-gradient(to bottom,
          rgba(235,245,255,.95) 0%,
          rgba(160,210,255,.54) 12%,
          rgba(120,180,255,.16) 40%,
          rgba(70,120,255,.05) 74%,
          rgba(0,0,0,0) 100%);
      filter:blur(4px);
      opacity:.72;
      z-index:18;
      pointer-events:none;
      animation:beamPulse 2.1s ease-in-out infinite;
    }

    .x-beam::after{
      content:"";
      position:absolute;
      left:50%;
      top:0;
      width:54px;
      height:100%;
      transform:translateX(-50%);
      background:
        linear-gradient(to bottom,
          rgba(180,220,255,.18),
          rgba(90,140,255,.05),
          rgba(0,0,0,0));
      filter:blur(16px);
    }

    @keyframes beamPulse{
      0%,100%{
        opacity:.5;
        transform:translateX(236px) scaleY(.96);
      }
      50%{
        opacity:.88;
        transform:translateX(236px) scaleY(1.03);
      }
    }

    /* Большой Буран под Х */
    .rocket-stage{
      position:absolute;
      left:50%;
      top:calc(29% + 56px);
      width:min(31vw, 390px);
      transform:translateX(132px);
      z-index:30;
      pointer-events:none;
    }

    .rocket-wrap{
      position:relative;
      width:100%;
    }

    .rocket-img{
      display:block;
      width:100%;
      height:auto;
      user-select:none;
      -webkit-user-drag:none;
      position:relative;
      z-index:5;
      filter:
        drop-shadow(0 0 10px rgba(255,214,160,.08))
        drop-shadow(0 0 22px rgba(255,255,255,.04));
    }

    .engine-flame{
      position:absolute;
      left:50%;
      bottom:10%;
      transform:translateX(-50%);
      width:24%;
      height:16%;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.98) 0 18%, rgba(255,255,255,0) 34%),
        linear-gradient(to bottom,
          rgba(255,255,255,.96) 0%,
          rgba(255,234,176,.96) 16%,
          rgba(255,190,86,.94) 40%,
          rgba(255,116,20,.82) 66%,
          rgba(255,60,0,.22) 88%,
          rgba(0,0,0,0) 100%);
      filter:blur(5px);
      clip-path:polygon(34% 0%,66% 0%,86% 32%,72% 100%,28% 100%,14% 32%);
      animation:flameFlicker .11s ease-in-out infinite;
    }

    .engine-flame::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,.6),
          rgba(160,220,255,.14),
          rgba(0,0,0,0));
      filter:blur(14px);
      transform:scale(1.5,1.15);
      opacity:.42;
    }

    @keyframes flameFlicker{
      0%{transform:translateX(-50%) scaleY(.92) scaleX(.97);opacity:.84}
      50%{transform:translateX(-50%) scaleY(1.08) scaleX(1.04);opacity:1}
      100%{transform:translateX(-50%) scaleY(.97) scaleX(.98);opacity:.9}
    }

    .launch-glow{
      position:absolute;
      left:50%;
      top:calc(29% + 56px + 390px);
      transform:translateX(132px);
      width:min(34vw, 420px);
      height:20vh;
      background:
        radial-gradient(circle at 50% 20%,
          rgba(255,230,180,.18) 0%,
          rgba(255,150,42,.10) 28%,
          rgba(0,0,0,0) 70%);
      filter:blur(24px);
      z-index:10;
      pointer-events:none;
      animation:launchPulse .16s ease-in-out infinite;
    }

    @keyframes launchPulse{
      0%,100%{opacity:.58;transform:translateX(132px) scale(.98)}
      50%{opacity:1;transform:translateX(132px) scale(1.05)}
    }

    .exhaust-field{
      position:absolute;
      left:50%;
      top:calc(29% + 56px + 305px);
      transform:translateX(132px);
      width:min(36vw, 430px);
      height:36vh;
      z-index:12;
      pointer-events:none;
      overflow:visible;
    }

    .plume{
      position:absolute;
      left:50%;
      bottom:100%;
      border-radius:50%;
      mix-blend-mode:screen;
      filter:blur(15px);
      transform-origin:center;
      animation:plumeRise linear infinite;
    }

    @keyframes plumeRise{
      0%{
        opacity:0;
        transform:translate(-50%,0) scale(.7);
      }
      10%{
        opacity:.95;
      }
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--dx)), var(--dy)) scale(var(--scale));
      }
    }

    .core-plume{
      background:
        radial-gradient(circle at 50% 35%,
          rgba(255,255,255,.98) 0%,
          rgba(255,232,175,.96) 18%,
          rgba(255,186,82,.78) 40%,
          rgba(255,120,30,.28) 62%,
          rgba(0,0,0,0) 80%);
    }

    .smoke-plume{
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255,214,156,.26) 0%,
          rgba(200,140,95,.16) 30%,
          rgba(110,88,78,.10) 54%,
          rgba(0,0,0,0) 80%);
    }

    @media (max-width:1100px){
      .title-wrap{
        top:26%;
        width:96vw;
      }

      .title{
        font-size:clamp(28px,6.6vw,72px);
        letter-spacing:.08em;
      }

      .rocket-stage{
        width:min(40vw, 320px);
        top:calc(26% + 48px);
        transform:translateX(96px);
      }

      .x-beam{
        transform:translateX(168px);
        height:240px;
      }

      .launch-glow{
        top:calc(26% + 48px + 320px);
        width:min(44vw, 330px);
        transform:translateX(96px);
      }

      .exhaust-field{
        top:calc(26% + 48px + 250px);
        width:min(46vw, 340px);
        transform:translateX(96px);
      }
    }
  </style>
</head>
<body>
  <div id="scene"></div>

  <div class="title-wrap">
    <div class="title">Интеллект <span class="x" id="mainX">Х</span></div>
    <div class="sparkle-layer" id="sparkleLayer"></div>
    <div class="x-beam"></div>
  </div>

  <div class="launch-glow"></div>
  <div class="exhaust-field" id="exhaustField"></div>

  <div class="rocket-stage">
    <div class="rocket-wrap">
      <div class="engine-flame"></div>
      <img src="Buran.png" alt="Буран" class="rocket-img">
    </div>
  </div>

  <script>
    const scene = document.getElementById("scene");
    const exhaustField = document.getElementById("exhaustField");
    const sparkleLayer = document.getElementById("sparkleLayer");
    const mainX = document.getElementById("mainX");

    function createStars() {
      const count = 120;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 2 + 0.7;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDuration = (1.8 + Math.random() * 3.5) + "s";
        s.style.animationDelay = (Math.random() * 4) + "s";
        scene.appendChild(s);
      }
    }

    function createFormulas() {
      const formulas = [
        "∑ᵢ wᵢxᵢ → min L(θ)",
        "∂ℒ/∂θ = η · ∇f(x)",
        "P(x|y) ∝ P(y|x)P(x)",
        "while(true){ learn(); }",
        "f(x)=σ(Wx+b)",
        "∫ e^{-x²} dx",
        "E = mc²",
        "λ = h / p",
        "y = αx + β",
        "argmax P(token|context)",
        "∇·F = ρ/ε₀",
        "loss(x,y;w)",
        "θₜ₊₁ = θₜ - η∇J(θ)",
        "X ∈ ℋ",
        "Σ pᵢ log pᵢ",
        "Neural Graph G(V,E)",
        "class Mind extends System {}",
        "φ = (1 + √5)/2",
        "Ψ(x,t)",
        "lim x→∞",
        "P ≠ NP ?",
        "attention(Q,K,V)",
        "hₜ = tanh(Wx + Uhₜ₋₁)",
        "β̂ = (XᵀX)⁻¹Xᵀy",
        "Δt → 0",
        "sin²x + cos²x = 1",
        "∏(1+xₙ)",
        "cosmos :: intellect",
        "ρ(x,t)"
      ];

      const count = 34;
      for (let i = 0; i < count; i++) {
        const f = document.createElement("div");
        f.className = "formula";
        f.textContent = formulas[Math.floor(Math.random() * formulas.length)];
        f.style.left = (Math.random() * 92) + "%";
        f.style.top = (Math.random() * 82) + "%";
        f.style.fontSize = (10 + Math.random() * 17) + "px";
        f.style.animationDuration = (1.8 + Math.random() * 3.4) + "s";
        f.style.animationDelay = (Math.random() * 4) + "s";
        scene.appendChild(f);
      }
    }

    function createExhaust() {
      const total = 30;
      for (let i = 0; i < total; i++) {
        const p = document.createElement("div");
        const isCore = i < 12;
        p.className = "plume " + (isCore ? "core-plume" : "smoke-plume");

        const size = isCore ? (26 + Math.random() * 42) : (54 + Math.random() * 92);

        p.style.width = size + "px";
        p.style.height = size * (1.0 + Math.random() * 0.55) + "px";
        p.style.left = (42 + Math.random() * 16) + "%";
        p.style.bottom = (-6 + Math.random() * 18) + "px";
        p.style.animationDuration = (1.5 + Math.random() * 2.1) + "s";
        p.style.animationDelay = (Math.random() * 2.2) + "s";
        p.style.setProperty("--dx", ((Math.random() - 0.5) * 70) + "px");
        p.style.setProperty("--dy", (75 + Math.random() * 130) + "px");
        p.style.setProperty("--scale", (1.25 + Math.random() * 0.95).toFixed(2));

        exhaustField.appendChild(p);
      }
    }

    function createSparkles() {
      const colors = [
        "rgba(255,255,255,0.98)",
        "rgba(180,220,255,0.96)",
        "rgba(255,233,170,0.92)",
        "rgba(255,190,235,0.84)",
        "rgba(170,255,245,0.84)"
      ];

      const rect = mainX.getBoundingClientRect();
      const parentRect = mainX.parentElement.getBoundingClientRect();
      const localX = rect.left - parentRect.left;
      const localY = rect.top - parentRect.top;

      for (let i = 0; i < 30; i++) {
        const sp = document.createElement("div");
        const line = Math.random() > 0.55;
        sp.className = "spark" + (line ? " line" : "");
        const c = colors[Math.floor(Math.random() * colors.length)];

        if (!line) {
          const size = 2 + Math.random() * 4;
          sp.style.width = size + "px";
          sp.style.height = size + "px";
        } else {
          sp.style.width = (1.5 + Math.random() * 2) + "px";
          sp.style.height = (10 + Math.random() * 18) + "px";
        }

        sp.style.left = (localX + rect.width * (0.06 + Math.random() * 0.88)) + "px";
        sp.style.top = (localY + rect.height * (0.05 + Math.random() * 0.9)) + "px";
        sp.style.background = c;
        sp.style.boxShadow = `0 0 ${5 + Math.random() * 12}px ${c}`;
        sp.style.setProperty("--dx", ((Math.random() - 0.5) * 42) + "px");
        sp.style.setProperty("--dy", ((Math.random() - 0.5) * 30) + "px");
        sp.style.setProperty("--rot", ((Math.random() - 0.5) * 120) + "deg");
        sp.style.animationDuration = (0.9 + Math.random() * 1.6) + "s";
        sp.style.animationDelay = (Math.random() * 2.2) + "s";
        sparkleLayer.appendChild(sp);
      }
    }

    createStars();
    createFormulas();
    createExhaust();
    window.addEventListener("load", createSparkles);
  </script>
</body>
</html>
