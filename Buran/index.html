<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интеллект Х</title>
  <style>
    :root{
      --bg:#000000;

      /* Основная палитра */
      --blue-main:#bfe8ff;
      --blue-strong:#8ddcff;
      --blue-hot:#dff7ff;
      --blue-deep:#63caff;

      /* Общая точка привязки для Х / луча / ракеты / портрета */
      --anchor-x: 118px;

      /* Портрет */
      --portrait-w: min(15vw, 190px);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      position:relative;
      background:
        radial-gradient(circle at 50% 42%, rgba(20,70,120,.12) 0%, rgba(0,0,0,0) 24%),
        radial-gradient(circle at 50% 58%, rgba(60,140,255,.05) 0%, rgba(0,0,0,0) 20%),
        #000;
    }

    #scene{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:#000;
    }

    .star{
      position:absolute;
      border-radius:50%;
      background:var(--blue-hot);
      opacity:.18;
      box-shadow:
        0 0 6px rgba(180,235,255,.55),
        0 0 14px rgba(90,190,255,.22);
      pointer-events:none;
      animation:twinkle linear infinite;
      will-change:transform,opacity;
    }

    .formula{
      position:absolute;
      color:rgba(184,228,255,.34);
      font-family:"Times New Roman", Georgia, serif;
      white-space:nowrap;
      user-select:none;
      pointer-events:none;
      text-shadow:
        0 0 4px rgba(190,235,255,.10),
        0 0 12px rgba(90,190,255,.10);
      mix-blend-mode:screen;
      animation:twinkle linear infinite;
      will-change:transform,opacity;
    }

    @keyframes twinkle{
      0%,100%{
        opacity:.10;
        transform:scale(.96);
      }
      50%{
        opacity:.98;
        transform:scale(1.05);
      }
    }

    .title-wrap{
      position:absolute;
      left:50%;
      top:27%;
      transform:translate(-50%,-50%);
      z-index:20;
      text-align:center;
      pointer-events:none;
      width:min(92vw, 1280px);
    }

    .title{
      font-weight:300;
      font-size:clamp(42px, 6vw, 110px);
      letter-spacing:.08em;
      color:rgba(188,231,255,.96);
      text-shadow:
        0 0 10px rgba(180,225,255,.18),
        0 0 24px rgba(110,190,255,.14),
        0 0 54px rgba(70,150,255,.08);
      position:relative;
      display:inline-block;
      white-space:nowrap;
    }

    .title .x{
      position:relative;
      display:inline-block;
      font-weight:700;
      color:var(--blue-hot);
      text-shadow:
        0 0 8px rgba(220,248,255,1),
        0 0 18px rgba(170,232,255,.98),
        0 0 34px rgba(110,205,255,.88),
        0 0 60px rgba(70,170,255,.65),
        0 0 92px rgba(70,170,255,.28);
      animation:xPulse 2s ease-in-out infinite;
    }

    @keyframes xPulse{
      0%,100%{opacity:.93; transform:scale(1)}
      50%{opacity:1; transform:scale(1.03)}
    }

    .sparkle-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:25;
    }

    .spark{
      position:absolute;
      width:3px;
      height:3px;
      border-radius:50%;
      opacity:0;
      filter:blur(.2px);
      animation:sparkle linear infinite;
      mix-blend-mode:screen;
    }

    .spark.line{
      width:2px;
      height:18px;
      border-radius:999px;
      transform-origin:center;
    }

    @keyframes sparkle{
      0%{
        opacity:0;
        transform:translate(0,0) scale(.35) rotate(0deg);
      }
      20%{opacity:1}
      58%{opacity:.95}
      100%{
        opacity:0;
        transform:translate(var(--dx),var(--dy)) scale(1.6) rotate(var(--rot));
      }
    }

    /* Луч теперь привязан к той же точке, что и ракета */
    .x-beam{
      position:absolute;
      left:50%;
      top:calc(100% + 6px);
      transform:translateX(var(--anchor-x));
      width:16px;
      height:280px;
      background:
        linear-gradient(to bottom,
          rgba(225,248,255,.96) 0%,
          rgba(150,225,255,.60) 12%,
          rgba(95,185,255,.22) 40%,
          rgba(65,135,255,.07) 74%,
          rgba(0,0,0,0) 100%);
      filter:blur(4px);
      opacity:.80;
      z-index:18;
      pointer-events:none;
      animation:beamPulse 2.1s ease-in-out infinite;
    }

    .x-beam::after{
      content:"";
      position:absolute;
      left:50%;
      top:0;
      width:60px;
      height:100%;
      transform:translateX(-50%);
      background:
        linear-gradient(to bottom,
          rgba(175,230,255,.24),
          rgba(80,160,255,.08),
          rgba(0,0,0,0));
      filter:blur(18px);
    }

    @keyframes beamPulse{
      0%,100%{
        opacity:.56;
        transform:translateX(var(--anchor-x)) scaleY(.96);
      }
      50%{
        opacity:.96;
        transform:translateX(var(--anchor-x)) scaleY(1.03);
      }
    }

    /* ГРУППА справа под Х: ракета + портрет */
    .hero-group{
      position:absolute;
      left:50%;
      top:calc(27% + 52px);
      transform:translateX(calc(var(--anchor-x) - 24px));
      z-index:30;
      display:flex;
      align-items:flex-end;
      gap:min(2vw, 26px);
      pointer-events:none;
    }

    .master-stage{
      width:var(--portrait-w);
      position:relative;
      z-index:28;
      opacity:.98;
    }

    .master-img{
      display:block;
      width:100%;
      height:auto;
      object-fit:contain;
      filter:
        drop-shadow(0 0 10px rgba(160,225,255,.10))
        drop-shadow(0 0 22px rgba(90,175,255,.08));
    }

    .rocket-stage{
      position:relative;
      width:min(23vw, 280px);
      z-index:30;
    }

    .rocket-wrap{
      position:relative;
      width:100%;
    }

    .rocket-img{
      display:block;
      width:100%;
      height:auto;
      user-select:none;
      -webkit-user-drag:none;
      position:relative;
      z-index:5;
      filter:
        drop-shadow(0 0 10px rgba(255,214,160,.10))
        drop-shadow(0 0 22px rgba(220,245,255,.06));
    }

    .engine-flame{
      position:absolute;
      left:50%;
      bottom:10%;
      transform:translateX(-50%);
      width:24%;
      height:16%;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.98) 0 18%, rgba(255,255,255,0) 34%),
        linear-gradient(to bottom,
          rgba(255,255,255,.96) 0%,
          rgba(255,234,176,.96) 16%,
          rgba(255,190,86,.94) 40%,
          rgba(255,116,20,.82) 66%,
          rgba(255,60,0,.22) 88%,
          rgba(0,0,0,0) 100%);
      filter:blur(5px);
      clip-path:polygon(34% 0%,66% 0%,86% 32%,72% 100%,28% 100%,14% 32%);
      animation:flameFlicker .11s ease-in-out infinite;
    }

    .engine-flame::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,.6),
          rgba(160,220,255,.16),
          rgba(0,0,0,0));
      filter:blur(14px);
      transform:scale(1.5,1.15);
      opacity:.42;
    }

    @keyframes flameFlicker{
      0%{transform:translateX(-50%) scaleY(.92) scaleX(.97); opacity:.84}
      50%{transform:translateX(-50%) scaleY(1.08) scaleX(1.04); opacity:1}
      100%{transform:translateX(-50%) scaleY(.97) scaleX(.98); opacity:.9}
    }

    .launch-glow{
      position:absolute;
      left:50%;
      top:calc(27% + 52px + 290px);
      transform:translateX(calc(var(--anchor-x) - 24px + var(--portrait-w) + 8px));
      width:min(28vw, 320px);
      height:18vh;
      background:
        radial-gradient(circle at 50% 20%,
          rgba(255,230,180,.18) 0%,
          rgba(255,150,42,.10) 28%,
          rgba(0,0,0,0) 70%);
      filter:blur(24px);
      z-index:10;
      pointer-events:none;
      animation:launchPulse .16s ease-in-out infinite;
    }

    @keyframes launchPulse{
      0%,100%{opacity:.58; transform:translateX(calc(var(--anchor-x) - 24px + var(--portrait-w) + 8px)) scale(.98)}
      50%{opacity:1; transform:translateX(calc(var(--anchor-x) - 24px + var(--portrait-w) + 8px)) scale(1.05)}
    }

    .exhaust-field{
      position:absolute;
      left:50%;
      top:calc(27% + 52px + 210px);
      transform:translateX(calc(var(--anchor-x) - 24px + var(--portrait-w) + 8px));
      width:min(31vw, 340px);
      height:34vh;
      z-index:12;
      pointer-events:none;
      overflow:visible;
    }

    .plume{
      position:absolute;
      left:50%;
      bottom:100%;
      border-radius:50%;
      mix-blend-mode:screen;
      filter:blur(15px);
      transform-origin:center;
      animation:plumeRise linear infinite;
    }

    @keyframes plumeRise{
      0%{
        opacity:0;
        transform:translate(-50%,0) scale(.7);
      }
      10%{
        opacity:.95;
      }
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--dx)), var(--dy)) scale(var(--scale));
      }
    }

    .core-plume{
      background:
        radial-gradient(circle at 50% 35%,
          rgba(255,255,255,.98) 0%,
          rgba(255,232,175,.96) 18%,
          rgba(255,186,82,.78) 40%,
          rgba(255,120,30,.28) 62%,
          rgba(0,0,0,0) 80%);
    }

    .smoke-plume{
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255,214,156,.26) 0%,
          rgba(200,140,95,.16) 30%,
          rgba(110,88,78,.10) 54%,
          rgba(0,0,0,0) 80%);
    }

    @media (max-width:1100px){
      :root{
        --anchor-x: 88px;
        --portrait-w: min(18vw, 150px);
      }

      .title-wrap{
        top:25%;
        width:96vw;
      }

      .title{
        font-size:clamp(32px, 6vw, 74px);
      }

      .x-beam{
        height:230px;
      }

      .hero-group{
        top:calc(25% + 46px);
        gap:16px;
      }

      .rocket-stage{
        width:min(28vw, 220px);
      }

      .launch-glow{
        top:calc(25% + 46px + 240px);
      }

      .exhaust-field{
        top:calc(25% + 46px + 180px);
        width:min(38vw, 290px);
      }
    }
  </style>
</head>
<body>
  <div id="scene"></div>

  <div class="title-wrap">
    <div class="title">Интеллект <span class="x" id="mainX">Х</span></div>
    <div class="sparkle-layer" id="sparkleLayer"></div>
    <div class="x-beam"></div>
  </div>

  <div class="hero-group">
    <div class="master-stage">
      <img src="Konstantin-Sheremetyev.png" alt="Мастер" class="master-img">
    </div>

    <div class="rocket-stage">
      <div class="rocket-wrap">
        <div class="engine-flame"></div>
        <img src="Buran.png" alt="Буран" class="rocket-img">
      </div>
    </div>
  </div>

  <div class="launch-glow"></div>
  <div class="exhaust-field" id="exhaustField"></div>

  <script>
    const scene = document.getElementById("scene");
    const exhaustField = document.getElementById("exhaustField");
    const sparkleLayer = document.getElementById("sparkleLayer");
    const mainX = document.getElementById("mainX");

    function createStars() {
      const count = 115;
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 2 + 0.7;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDuration = (1.8 + Math.random() * 3.5) + "s";
        s.style.animationDelay = (Math.random() * 4) + "s";
        scene.appendChild(s);
      }
    }

    function createFormulas() {
      const formulas = [
        "∑ᵢ wᵢxᵢ → min L(θ)",
        "∂ℒ/∂θ = η · ∇f(x)",
        "P(x|y) ∝ P(y|x)P(x)",
        "while(true){ learn(); }",
        "f(x)=σ(Wx+b)",
        "∫ e^{-x²} dx",
        "E = mc²",
        "λ = h / p",
        "y = αx + β",
        "argmax P(token|context)",
        "∇·F = ρ/ε₀",
        "loss(x,y;w)",
        "θₜ₊₁ = θₜ - η∇J(θ)",
        "X ∈ ℋ",
        "Σ pᵢ log pᵢ",
        "Neural Graph G(V,E)",
        "class Mind extends System {}",
        "φ = (1 + √5)/2",
        "Ψ(x,t)",
        "lim x→∞",
        "P ≠ NP ?",
        "attention(Q,K,V)",
        "hₜ = tanh(Wx + Uhₜ₋₁)",
        "β̂ = (XᵀX)⁻¹Xᵀy",
        "Δt → 0",
        "sin²x + cos²x = 1",
        "∏(1+xₙ)",
        "cosmos :: intellect",
        "ρ(x,t)"
      ];

      const count = 34;
      for (let i = 0; i < count; i++) {
        const f = document.createElement("div");
        f.className = "formula";
        f.textContent = formulas[Math.floor(Math.random() * formulas.length)];
        f.style.left = (Math.random() * 92) + "%";
        f.style.top = (Math.random() * 82) + "%";
        f.style.fontSize = (10 + Math.random() * 17) + "px";
        f.style.animationDuration = (1.8 + Math.random() * 3.4) + "s";
        f.style.animationDelay = (Math.random() * 4) + "s";
        scene.appendChild(f);
      }
    }

    function createExhaust() {
      const total = 30;
      for (let i = 0; i < total; i++) {
        const p = document.createElement("div");
        const isCore = i < 12;
        p.className = "plume " + (isCore ? "core-plume" : "smoke-plume");

        const size = isCore ? (26 + Math.random() * 42) : (54 + Math.random() * 92);

        p.style.width = size + "px";
        p.style.height = size * (1.0 + Math.random() * 0.55) + "px";
        p.style.left = (42 + Math.random() * 16) + "%";
        p.style.bottom = (-6 + Math.random() * 18) + "px";
        p.style.animationDuration = (1.5 + Math.random() * 2.1) + "s";
        p.style.animationDelay = (Math.random() * 2.2) + "s";
        p.style.setProperty("--dx", ((Math.random() - 0.5) * 70) + "px");
        p.style.setProperty("--dy", (75 + Math.random() * 130) + "px");
        p.style.setProperty("--scale", (1.25 + Math.random() * 0.95).toFixed(2));

        exhaustField.appendChild(p);
      }
    }

    function createSparkles() {
      const colors = [
        "rgba(220,248,255,0.98)",
        "rgba(160,230,255,0.96)",
        "rgba(110,205,255,0.92)",
        "rgba(120,255,255,0.84)",
        "rgba(195,235,255,0.90)"
      ];

      const rect = mainX.getBoundingClientRect();
      const parentRect = mainX.parentElement.getBoundingClientRect();

      const localX = rect.left - parentRect.left;
      const localY = rect.top - parentRect.top;

      for (let i = 0; i < 26; i++) {
        const sp = document.createElement("div");
        const line = Math.random() > 0.55;
        sp.className = "spark" + (line ? " line" : "");

        if (!line) {
          const size = 2 + Math.random() * 4;
          sp.style.width = size + "px";
          sp.style.height = size + "px";
        } else {
          sp.style.width = (1.5 + Math.random() * 2) + "px";
          sp.style.height = (10 + Math.random() * 18) + "px";
        }

        const c = colors[Math.floor(Math.random() * colors.length)];
        sp.style.background = c;
        sp.style.boxShadow = `0 0 ${5 + Math.random() * 12}px ${c}`;
        sp.style.left = (localX + rect.width * (0.08 + Math.random() * 0.84)) + "px";
        sp.style.top = (localY + rect.height * (0.06 + Math.random() * 0.84)) + "px";
        sp.style.setProperty("--dx", ((Math.random() - 0.5) * 40) + "px");
        sp.style.setProperty("--dy", ((Math.random() - 0.5) * 28) + "px");
        sp.style.setProperty("--rot", ((Math.random() - 0.5) * 120) + "deg");
        sp.style.animationDuration = (0.9 + Math.random() * 1.6) + "s";
        sp.style.animationDelay = (Math.random() * 2.2) + "s";

        sparkleLayer.appendChild(sp);
      }
    }

    createStars();
    createFormulas();
    createExhaust();
    window.addEventListener("load", createSparkles);
  </script>
</body>
</html>
